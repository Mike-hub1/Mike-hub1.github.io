name: Import sealed site

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and verify archive
        env:
          ARCHIVE_URL: https://using-slightly-soon-bare.trycloudflare.com/worldcup-static-archive-7aa1fb2.tar.gz
          ARCHIVE_SHA256: b1d0a2099e44f81358040499be5e1bd26196de03760ac1d904a6fa99eed94b22
        run: |
          curl --fail --location --retry 8 --retry-all-errors --connect-timeout 20 "$ARCHIVE_URL" --output /tmp/worldcup-site.tar.gz
          echo "$ARCHIVE_SHA256  /tmp/worldcup-site.tar.gz" | sha256sum --check
      - name: Commit sealed site
        run: |
          tar --extract --gzip --file /tmp/worldcup-site.tar.gz --directory .
          git rm --force .github/workflows/import-archive.yml
          rmdir .github/workflows
          rmdir .github
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit --message "Publish 2026 World Cup static archive"
          git push origin HEAD:main
